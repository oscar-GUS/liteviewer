name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Despliegue por RAMA gh-pages (git push), no por la API de deployments.
permissions:
  contents: write

concurrency:
  group: pages-branch
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Publicar dist en la rama gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
